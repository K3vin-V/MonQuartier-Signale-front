name: Déploiement Flutter Web sur GitHub Pages

on:
  push:
    branches: [main]
    paths: ["flutter_app/**"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Installer les dépendances
        working-directory: flutter_app
        run: flutter pub get

      - name: Build web
        working-directory: flutter_app
        # L'URL de l'API Oracle Cloud est injectée au build, jamais en dur dans le code.
        run: |
          flutter build web --release \
            --base-href "/" \
            --dart-define=API_BASE_URL=${{ vars.API_BASE_URL }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: flutter_app/build/web

      - id: deployment
        uses: actions/deploy-pages@v4
